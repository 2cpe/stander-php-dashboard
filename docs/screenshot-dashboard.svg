<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Dashboard view mockup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- browser chrome -->
  <rect x="40" y="30" width="720" height="440" rx="10" fill="#161b22" stroke="#3b5998" stroke-opacity="0.5"/>
  <rect x="40" y="30" width="720" height="34" rx="10 10 0 0" fill="#21262d"/>
  <circle cx="60" cy="47" r="5" fill="#ff5f56"/>
  <circle cx="78" cy="47" r="5" fill="#ffbd2e"/>
  <circle cx="96" cy="47" r="5" fill="#27c93f"/>
  <rect x="200" y="38" width="320" height="18" rx="4" fill="#0d1117"/>
  <text x="360" y="51" text-anchor="middle" fill="#8b949e" font-family="ui-monospace,monospace" font-size="11">localhost:8000/dashboard.php</text>

  <!-- card -->
  <rect x="80" y="90" width="640" height="360" rx="8" fill="#ffffff" stroke="#e6e6e6"/>
  <text x="110" y="140" fill="#333" font-family="Arial,sans-serif" font-weight="700" font-size="24">Welcome, Anass Mohammed</text>

  <g font-family="Arial,sans-serif" font-size="14" fill="#333">
    <text x="110" y="190"><tspan font-weight="700">Username:</tspan> <tspan fill="#666">anas_admin</tspan></text>
    <line x1="110" y1="210" x2="690" y2="210" stroke="#eeeeee"/>

    <text x="110" y="235"><tspan font-weight="700">Email:</tspan> <tspan fill="#666">anas@example.com</tspan></text>
    <line x1="110" y1="255" x2="690" y2="255" stroke="#eeeeee"/>

    <text x="110" y="280"><tspan font-weight="700">Role:</tspan> <tspan fill="#3b5998">admin</tspan></text>
    <line x1="110" y1="300" x2="690" y2="300" stroke="#eeeeee"/>

    <text x="110" y="325"><tspan font-weight="700">Location:</tspan> <tspan fill="#666">Riyadh, Saudi Arabia</tspan></text>
    <line x1="110" y1="345" x2="690" y2="345" stroke="#eeeeee"/>
  </g>

  <g transform="translate(110 380)">
    <rect x="0" y="0" width="120" height="40" rx="4" fill="#f44336"/>
    <text x="60" y="26" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="14" font-weight="600">Logout</text>
    <rect x="140" y="0" width="160" height="40" rx="4" fill="#3b5998"/>
    <text x="220" y="26" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="14" font-weight="600">Admin Panel</text>
  </g>
</svg>
