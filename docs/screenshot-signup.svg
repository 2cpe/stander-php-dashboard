<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" role="img" aria-label="Signup form mockup">
  <rect width="600" height="520" fill="#000000"/>
  <rect x="20" y="20" width="560" height="480" rx="6" fill="#0d1117" stroke="#3b5998"/>

  <g font-family="Arial,sans-serif" fill="#ffffff">
    <text x="60" y="80" font-weight="700" font-size="26">Sign Up</text>
    <text x="60" y="104" font-size="13" fill="#8b949e">Create a new stander account</text>
  </g>

  <g font-family="Arial,sans-serif">
    <text x="60" y="146" fill="#ffffff" font-size="12">First name</text>
    <rect x="60" y="156" width="225" height="34" rx="5" fill="#1b1b1b" stroke="#3b5998" stroke-width="2"/>
    <text x="76" y="178" fill="#8b949e" font-size="13">Anass</text>

    <text x="315" y="146" fill="#ffffff" font-size="12">Last name</text>
    <rect x="315" y="156" width="225" height="34" rx="5" fill="#1b1b1b" stroke="#3b5998" stroke-width="2"/>
    <text x="331" y="178" fill="#8b949e" font-size="13">Mohammed</text>

    <text x="60" y="216" fill="#ffffff" font-size="12">Email</text>
    <rect x="60" y="226" width="480" height="34" rx="5" fill="#1b1b1b" stroke="#3b5998" stroke-width="2"/>
    <text x="76" y="248" fill="#8b949e" font-size="13">you@example.com</text>

    <text x="60" y="286" fill="#ffffff" font-size="12">Username</text>
    <rect x="60" y="296" width="480" height="34" rx="5" fill="#1b1b1b" stroke="#3b5998" stroke-width="2"/>
    <text x="76" y="318" fill="#8b949e" font-size="13">pick a username</text>

    <text x="60" y="356" fill="#ffffff" font-size="12">Password</text>
    <rect x="60" y="366" width="480" height="34" rx="5" fill="#1b1b1b" stroke="#3b5998" stroke-width="2"/>
    <text x="76" y="388" fill="#8b949e" font-size="14">••••••••</text>

    <rect x="60" y="424" width="480" height="40" rx="5" fill="#3b5998"/>
    <text x="300" y="450" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Create account</text>
  </g>
</svg>
