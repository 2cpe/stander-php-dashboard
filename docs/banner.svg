<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="stander-php-dashboard banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="60%" stop-color="#11151c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b5998" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3b5998" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3b5998" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- decorative grid -->
  <g stroke="#3b5998" stroke-opacity="0.08" stroke-width="1">
    <path d="M0 80 H1280 M0 160 H1280 M0 240 H1280"/>
    <path d="M213 0 V320 M426 0 V320 M640 0 V320 M853 0 V320 M1066 0 V320"/>
  </g>

  <!-- corner brackets -->
  <g stroke="#3b5998" stroke-width="2" fill="none">
    <path d="M40 40 H80 M40 40 V80"/>
    <path d="M1240 40 H1200 M1240 40 V80"/>
    <path d="M40 280 H80 M40 280 V240"/>
    <path d="M1240 280 H1200 M1240 280 V240"/>
  </g>

  <!-- logo mark -->
  <g transform="translate(80 90)">
    <rect x="0" y="0" width="140" height="140" fill="#0d1117" stroke="#3b5998" stroke-width="2" rx="8"/>
    <g transform="translate(28 28)" stroke="#3b5998" stroke-width="3" fill="none">
      <rect x="0" y="6" width="34" height="22" rx="2"/>
      <path d="M0 6 V0 a17 17 0 0 1 34 0 V6"/>
    </g>
    <g transform="translate(78 36)" fill="#3b5998">
      <rect x="0" y="0" width="8" height="8"/>
      <rect x="14" y="0" width="8" height="8"/>
      <rect x="28" y="0" width="8" height="8"/>
      <rect x="0" y="14" width="8" height="8"/>
      <rect x="14" y="14" width="8" height="8"/>
      <rect x="28" y="14" width="8" height="8"/>
      <rect x="0" y="28" width="8" height="8"/>
      <rect x="14" y="28" width="8" height="8"/>
      <rect x="28" y="28" width="8" height="8"/>
    </g>
    <text x="70" y="130" text-anchor="middle" fill="#3b5998" font-family="ui-monospace,monospace" font-size="11">S</text>
  </g>

  <!-- title block -->
  <g transform="translate(260 130)" fill="#e6edf3" font-family="ui-sans-serif,system-ui,Inter,Helvetica,Arial,sans-serif">
    <text font-size="46" font-weight="700" letter-spacing="-1">
      stander-<tspan fill="#3b5998">php</tspan>-dashboard
    </text>
    <text y="46" font-size="20" font-weight="500" fill="#8b949e">
      PHP + MySQL authentication and admin panel
    </text>
    <g transform="translate(0 96)" font-family="ui-monospace,monospace" font-size="13" fill="#3b5998">
      <rect x="0" y="-14" width="148" height="22" fill="#3b5998" fill-opacity="0.12" rx="3"/>
      <text x="74" y="2" text-anchor="middle">MYSQL · SESSIONS</text>
      <rect x="160" y="-14" width="118" height="22" fill="#3b5998" fill-opacity="0.12" rx="3"/>
      <text x="219" y="2" text-anchor="middle">PHP · PLAIN CSS</text>
      <rect x="290" y="-14" width="100" height="22" fill="#3b5998" fill-opacity="0.12" rx="3"/>
      <text x="340" y="2" text-anchor="middle">CRUD · ROLES</text>
    </g>
  </g>

  <!-- accent line at the bottom -->
  <rect x="0" y="318" width="1280" height="2" fill="url(#accent)"/>
</svg>
