<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Login form mockup">
  <rect width="600" height="400" fill="#000000"/>
  <rect x="20" y="20" width="560" height="360" rx="6" fill="#0d1117" stroke="#3b5998"/>

  <g font-family="Arial,sans-serif" fill="#ffffff">
    <text x="60" y="90" font-weight="700" font-size="26">Login</text>
    <text x="60" y="115" font-size="13" fill="#8b949e">Sign in to your stander account</text>
  </g>

  <g font-family="Arial,sans-serif">
    <text x="60" y="160" fill="#ffffff" font-size="12">Username</text>
    <rect x="60" y="170" width="480" height="36" rx="5" fill="#1b1b1b" stroke="#3b5998" stroke-width="2"/>
    <text x="76" y="194" fill="#8b949e" font-size="14">anas_admin</text>

    <text x="60" y="232" fill="#ffffff" font-size="12">Password</text>
    <rect x="60" y="242" width="480" height="36" rx="5" fill="#1b1b1b" stroke="#3b5998" stroke-width="2"/>
    <text x="76" y="266" fill="#8b949e" font-size="14">••••••••</text>

    <rect x="60" y="300" width="480" height="40" rx="5" fill="#3b5998"/>
    <text x="300" y="326" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Login</text>
  </g>

  <text x="300" y="362" text-anchor="middle" fill="#8b949e" font-family="Arial,sans-serif" font-size="12">Don't have an account? <tspan fill="#3b5998">Sign up</tspan></text>
</svg>
